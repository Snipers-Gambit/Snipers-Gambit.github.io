<!DOCTYPE html>
<html>

<head>
    <title>Aura Empire - Word Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
        }

        h1 {
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            margin-bottom: 10px;
        }

        .subtitle {
            color: rgba(255,255,255,0.9);
            margin-bottom: 20px;
        }

        .game-container {
            background: white;
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            display: flex;
            gap: 30px;
            max-width: 1000px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .left-panel {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .stats {
            background: #f0f0f0;
            padding: 15px;
            border-radius: 5px;
            text-align: center;
            min-width: 200px;
        }

        .stat-item {
            font-size: 16px;
            margin: 8px 0;
        }

        .stat-label {
            color: #666;
            font-size: 12px;
            text-transform: uppercase;
        }

        .stat-value {
            color: #667eea;
            font-size: 24px;
            font-weight: bold;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(5, 60px);
            gap: 8px;
            background: #333;
            padding: 12px;
            border-radius: 8px;
        }

        .tile {
            width: 60px;
            height: 60px;
            background: white;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #333;
            user-select: none;
        }

        .tile:hover {
            background: #f0f0f0;
            transform: scale(1.05);
        }

        .tile.selected {
            background: #667eea;
            color: white;
            border-color: #667eea;
            box-shadow: 0 0 10px rgba(102, 126, 234, 0.5);
        }

        .tile.empty {
            background: #f9f9f9;
            color: #ccc;
            cursor: default;
        }

        .tile.empty:hover {
            background: #f9f9f9;
            transform: none;
        }

        .right-panel {
            display: flex;
            flex-direction: column;
            gap: 20px;
            min-width: 300px;
        }

        .input-section {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .input-label {
            font-weight: bold;
            color: #333;
            font-size: 14px;
        }

        .word-input {
            width: 100%;
            padding: 12px;
            font-size: 18px;
            border: 2px solid #ddd;
            border-radius: 5px;
            transition: border 0.3s;
        }

        .word-input:focus {
            outline: none;
            border-color: #667eea;
        }

        .selected-tiles {
            background: #f9f9f9;
            padding: 12px;
            border-radius: 5px;
            border: 2px solid #ddd;
            min-height: 40px;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .selected-tile-badge {
            background: #667eea;
            color: white;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .selected-tile-badge .remove {
            cursor: pointer;
            font-weight: bold;
            margin-left: 4px;
        }

        .selected-tiles.empty {
            color: #999;
            font-size: 12px;
        }

        .button-group {
            display: flex;
            gap: 10px;
            flex-direction: column;
        }

        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: background 0.3s;
        }

        button:hover {
            background: #764ba2;
        }

        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        button.secondary {
            background: #999;
        }

        button.secondary:hover {
            background: #777;
        }

        .output-window {
            background: #1e1e1e;
            color: #00ff00;
            border: 2px solid #667eea;
            border-radius: 5px;
            padding: 12px;
            min-height: 120px;
            width: 100%;
            text-align: left;
            overflow-y: auto;
            max-height: 200px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            line-height: 1.4;
        }

        .output-line {
            margin: 4px 0;
        }

        .output-timestamp {
            color: #888;
            margin-right: 8px;
        }

        .message {
            color: #00ff00;
        }

        .message.success {
            color: #00ff00;
        }

        .message.error {
            color: #ff6b6b;
        }

        .message.info {
            color: #4ecdc4;
        }

        .message.ai {
            color: #ffd700;
        }

        .controls {
            display: flex;
            gap: 10px;
        }

        .controls button {
            flex: 1;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .modal-title {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 15px;
            color: #333;
        }

        .modal-text {
            font-size: 18px;
            color: #666;
            margin-bottom: 20px;
        }

        .modal-value {
            font-size: 36px;
            color: #667eea;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .modal button {
            margin: 10px;
            padding: 12px 30px;
            font-size: 16px;
        }
    </style>
</head>

<body>

    <h1>🌟 Aura Empire Word Game 🌟</h1>
    <p class="subtitle">Build words from shared tiles. Longer words = more points!</p>

    <div class="game-container">
        
        <!-- Left Panel: Grid and Stats -->
        <div class="left-panel">
            <div class="stats">
                <div class="stat-item">
                    <div class="stat-label">Your Score</div>
                    <div class="stat-value" id="playerScore">0</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">AI Score</div>
                    <div class="stat-value" id="aiScore">0</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">Turn</div>
                    <div class="stat-value" id="turnCount">1</div>
                </div>
            </div>

            <div class="grid" id="gameGrid"></div>
        </div>

        <!-- Right Panel: Input and Controls -->
        <div class="right-panel">
            <div class="input-section">
                <label class="input-label">Click tiles to select them:</label>
                <div class="selected-tiles empty" id="selectedTiles">
                    No tiles selected
                </div>
            </div>

            <div class="input-section">
                <label class="input-label">Enter your word:</label>
                <input type="text" class="word-input" id="wordInput" placeholder="Type word here..." />
            </div>

            <div class="button-group">
                <button id="submitBtn" onclick="submitWord()">Submit Word</button>
                <button class="secondary" id="clearBtn" onclick="clearSelection()">Clear Selection</button>
            </div>

            <div>
                <label class="input-label">Game Log:</label>
                <div class="output-window" id="outputWindow">
                    <div class="output-line">
                        <span class="output-timestamp">[INIT]</span>
                        <span class="message info">Game started! Place your first letter.</span>
                    </div>
                </div>
            </div>

            <button class="secondary" onclick="newGame()" style="width: 100%;">New Game</button>
        </div>
    </div>

    <!-- Modal for round results -->
    <div class="modal" id="resultModal">
        <div class="modal-content">
            <div class="modal-title" id="resultTitle">Round Result</div>
            <div class="modal-text" id="resultMessage"></div>
            <div class="modal-value" id="resultPoints">0 pts</div>
            <button onclick="closeModal()">Continue</button>
        </div>
    </div>

    <script>
        const GRID_SIZE = 5;
        const VOWELS = ['A', 'E', 'I', 'O', 'U'];
        const CONSONANTS = ['B', 'C', 'D', 'F', 'G', 'H', 'J', 'K', 'L', 'M', 'N', 'P', 'Q', 'R', 'S', 'T', 'V', 'W', 'X', 'Y', 'Z'];

        let grid = Array(GRID_SIZE * GRID_SIZE).fill('');
        let selectedIndices = [];
        let playerScore = 0;
        let aiScore = 0;
        let turnCount = 0;
        let gamePhase = 'playerPlace'; // playerPlace, aiPlace, playerWord
        let lastAILetters = [];
        let validWords = new Set();

        // Common valid English words for validation (simplified set)
        const VALID_WORD_LIST = new Set([
            'a', 'about', 'ace', 'act', 'add', 'age', 'ago', 'aid', 'aim', 'air', 'all', 'and', 'ant', 'any', 'ape', 'are', 'ark', 'arm', 'art', 'ash', 'ask', 'ate',
            'bad', 'bag', 'ban', 'bar', 'bat', 'bay', 'be', 'bed', 'bee', 'bet', 'bid', 'big', 'bin', 'bit', 'box', 'boy', 'bus', 'but', 'buy',
            'cab', 'can', 'cap', 'car', 'cat', 'cot', 'cow', 'cry', 'cup', 'cut',
            'dad', 'day', 'den', 'did', 'die', 'dig', 'dog', 'dot', 'dry',
            'ear', 'eat', 'egg', 'end', 'eye',
            'fan', 'far', 'fat', 'few', 'fig', 'fin', 'fit', 'fly', 'for', 'fox', 'fun', 'fur',
            'gap', 'gas', 'get', 'god', 'got', 'gun', 'guy',
            'had', 'ham', 'has', 'hat', 'have', 'he', 'head', 'hear', 'her', 'hid', 'him', 'his', 'hit', 'hog', 'hop', 'hot', 'how', 'hug',
            'i', 'ice', 'ill', 'in', 'ink', 'is', 'it',
            'jam', 'jar', 'jet', 'job', 'jog', 'joy', 'jump',
            'key', 'kid', 'king',
            'lab', 'lag', 'lap', 'law', 'lay', 'leg', 'let', 'lid', 'lie', 'lip', 'lit', 'log', 'lot', 'low',
            'mad', 'man', 'map', 'mat', 'may', 'men', 'met', 'mid', 'mix', 'mob', 'mop', 'mud',
            'nap', 'net', 'new', 'no', 'not', 'now', 'nut',
            'oak', 'odd', 'off', 'oil', 'ok', 'old', 'on', 'one', 'or', 'our', 'out', 'oven', 'over', 'ox', 'own',
            'pad', 'pal', 'pan', 'pat', 'paw', 'pay', 'peg', 'pen', 'pet', 'pig', 'pin', 'pit', 'plan', 'play', 'pot', 'put',
            'rad', 'rag', 'rain', 'ran', 'rat', 'red', 'rid', 'rig', 'ring', 'rob', 'rod', 'rot', 'row', 'rub', 'rug', 'run',
            'sad', 'sat', 'saw', 'say', 'sea', 'set', 'she', 'sit', 'six', 'sky', 'so', 'some', 'son', 'spot', 'sun',
            'tab', 'tag', 'tail', 'take', 'talk', 'tap', 'tar', 'tax', 'tea', 'ten', 'test', 'than', 'that', 'the', 'them', 'then', 'there', 'these', 'they', 'thin', 'this', 'tie', 'time', 'tip', 'to', 'toe', 'too', 'top', 'toy', 'tree', 'trip', 'true', 'try', 'two',
            'use',
            'van', 'very', 'via', 'view', 'vine',
            'wag', 'wait', 'walk', 'wall', 'want', 'war', 'warm', 'was', 'wash', 'water', 'wave', 'way', 'we', 'wear', 'web', 'wet', 'what', 'when', 'where', 'which', 'while', 'who', 'why', 'wig', 'win', 'window', 'wing', 'with', 'woman', 'women', 'word', 'work', 'world', 'worry', 'worse', 'worst', 'write', 'wrong',
            'yard', 'year', 'yes', 'yet', 'you', 'young', 'your',
            'zoo'
        ]);

        function initGrid() {
            grid = Array(GRID_SIZE * GRID_SIZE).fill('');
            selectedIndices = [];
            turnCount = 0;
            playerScore = 0;
            aiScore = 0;
            gamePhase = 'playerPlace';
            lastAILetters = [];
            updateDisplay();
            log('Game initialized! Place your first letter.', 'info');
        }

        function renderGrid() {
            const gridContainer = document.getElementById('gameGrid');
            gridContainer.innerHTML = '';

            grid.forEach((letter, index) => {
                const tile = document.createElement('div');
                tile.className = 'tile';
                tile.textContent = letter;

                if (!letter) {
                    tile.className += ' empty';
                    tile.textContent = '·';
                } else {
                    tile.addEventListener('click', () => toggleTileSelection(index));
                    if (selectedIndices.includes(index)) {
                        tile.className += ' selected';
                    }
                }

                gridContainer.appendChild(tile);
            });
        }

        function toggleTileSelection(index) {
            if (!grid[index]) return;
            if (gamePhase !== 'playerWord') return;

            if (selectedIndices.includes(index)) {
                selectedIndices = selectedIndices.filter(i => i !== index);
            } else {
                selectedIndices.push(index);
            }

            updateSelectedDisplay();
            renderGrid();
        }

        function updateSelectedDisplay() {
            const container = document.getElementById('selectedTiles');
            
            if (selectedIndices.length === 0) {
                container.className = 'selected-tiles empty';
                container.innerHTML = 'No tiles selected';
            } else {
                container.className = 'selected-tiles';
                container.innerHTML = selectedIndices.map(index => {
                    return `<div class="selected-tile-badge">${grid[index]} <span class="remove" onclick="removeTileSelection(${index})">✕</span></div>`;
                }).join('');
            }
        }

        function removeTileSelection(index) {
            selectedIndices = selectedIndices.filter(i => i !== index);
            updateSelectedDisplay();
            renderGrid();
        }

        function clearSelection() {
            selectedIndices = [];
            document.getElementById('wordInput').value = '';
            updateSelectedDisplay();
            renderGrid();
        }

        function updateDisplay() {
            document.getElementById('playerScore').textContent = playerScore;
            document.getElementById('aiScore').textContent = aiScore;
            document.getElementById('turnCount').textContent = turnCount;
        }

        function log(message, type = 'message') {
            const outputWindow = document.getElementById('outputWindow');
            const timestamp = new Date().toLocaleTimeString();
            const line = document.createElement('div');
            line.className = `output-line`;
            line.innerHTML = `<span class="output-timestamp">[${timestamp}]</span><span class="message ${type}">${message}</span>`;
            outputWindow.appendChild(line);
            outputWindow.scrollTop = outputWindow.scrollHeight;
        }

        function getRandomLetter() {
            if (Math.random() < 0.4) {
                return VOWELS[Math.floor(Math.random() * VOWELS.length)];
            } else {
                return CONSONANTS[Math.floor(Math.random() * CONSONANTS.length)];
            }
        }

        function placePlayerLetter(letter) {
            const emptySpaces = grid.map((cell, idx) => cell === '' ? idx : null).filter(x => x !== null);
            if (emptySpaces.length === 0) {
                log('Grid is full! Cannot place letter.', 'error');
                return false;
            }

            const randomIndex = emptySpaces[Math.floor(Math.random() * emptySpaces.length)];
            grid[randomIndex] = letter.toUpperCase();
            lastAILetters = [];
            gamePhase = 'aiPlace';
            renderGrid();
            log(`You placed: ${letter.toUpperCase()} at position ${randomIndex}`, 'success');
            return true;
        }

        function aiPlaceLetter() {
            const emptySpaces = grid.map((cell, idx) => cell === '' ? idx : null).filter(x => x !== null);
            if (emptySpaces.length === 0) {
                log('Grid is full! No space for AI move.', 'error');
                gamePhase = 'playerWord';
                renderGrid();
                updateDisplay();
                return;
            }

            const letter = getRandomLetter();
            const randomIndex = emptySpaces[Math.floor(Math.random() * emptySpaces.length)];
            grid[randomIndex] = letter;
            lastAILetters = [randomIndex];
            gamePhase = 'playerWord';
            turnCount++;
            renderGrid();
            log(`AI placed: ${letter} at position ${randomIndex}`, 'ai');
            log('Now select tiles and form a word to score points!', 'info');
            updateDisplay();
        }

        function submitWord() {
            if (gamePhase !== 'playerWord') {
                log('Not the right time to submit a word.', 'error');
                return;
            }

            if (selectedIndices.length === 0) {
                log('Select tiles first!', 'error');
                return;
            }

            const word = document.getElementById('wordInput').value.toLowerCase().trim();
            if (!word) {
                log('Enter a word first!', 'error');
                return;
            }

            const selectedWord = selectedIndices.map(idx => grid[idx]).join('');
            if (selectedWord.toLowerCase() !== word) {
                log(`Word mismatch! Selected tiles: ${selectedWord}, but typed: ${word}`, 'error');
                return;
            }

            if (!isValidWord(word)) {
                log(`"${word}" is not a valid word!`, 'error');
                return;
            }

            const points = word.length * 10;
            playerScore += points;
            
            showResult(word, points);
            log(`Valid word! "${word}" = ${points} points!`, 'success');

            clearSelection();
            gamePhase = 'playerPlace';
            updateDisplay();

            setTimeout(() => {
                const letter = prompt('Enter a letter (a-z) to place:');
                if (letter && /^[a-z]$/i.test(letter)) {
                    if (placePlayerLetter(letter)) {
                        setTimeout(() => {
                            aiPlaceLetter();
                        }, 500);
                    }
                } else {
                    log('Invalid input. Skipping turn.', 'error');
                }
            }, 1500);
        }

        function isValidWord(word) {
            return VALID_WORD_LIST.has(word);
        }

        function showResult(word, points) {
            const modal = document.getElementById('resultModal');
            document.getElementById('resultTitle').textContent = '✨ Word Accepted! ✨';
            document.getElementById('resultMessage').textContent = `"${word.toUpperCase()}" is valid!`;
            document.getElementById('resultPoints').textContent = `+${points} points`;
            modal.classList.add('active');
        }

        function closeModal() {
            document.getElementById('resultModal').classList.remove('active');
        }

        function newGame() {
            if (confirm('Start a new game?')) {
                initGrid();
            }
        }

        // Start the game
        initGrid();
        renderGrid();

        // Initial letter placement
        setTimeout(() => {
            const letter = prompt('Enter your first letter (a-z):');
            if (letter && /^[a-z]$/i.test(letter)) {
                if (placePlayerLetter(letter)) {
                    setTimeout(() => {
                        aiPlaceLetter();
                    }, 500);
                }
            } else {
                log('Invalid input. Starting with random letter.', 'info');
                placePlayerLetter(getRandomLetter());
                setTimeout(() => {
                    aiPlaceLetter();
                }, 500);
            }
        }, 500);
    </script>

</body>

</html>
